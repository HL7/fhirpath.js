tests:
  - expression: '{}'
    result: []
  - expression: "'a\\\\b\\'\\\"\\`\\r\\n\\t\\u0065'" # double escape for YAML
    result: ["a\\b'\"`\r\n\te"]
  - expression: "'\\u00e9'"
    result: ["\u00E9"]
  - expression: "'\\u00E9'"
    result: ["\u00E9"]
  - expression: "'\\u12'"
    result: ["u12"]
  - expression: "'\\u123'"
    result: ["u123"]
  - expression: "'\\u12G4'"
    result: ["u12G4"]
  - expression: "'\\uZZZZ'"
    result: ["uZZZZ"]
  - expression: "\"a\\\\b\\'\\\"\\`\\r\\n\\t\\u0065\"" # using " to wrap a string is not allowed by grammar
    error: true
  - expression: "`a\\\\b\\'\\\"\\`\\r\\n\\t\\u0065`" # ` used to wrap an identifier
    result: []
  - expression: "`id\\u00e9`"
    result: ["decoded-id"]
  - expression: "`id\\u00E9`"
    result: ["decoded-id"]
  - expression: "`bad\\u12`"
    result: ["malformed-u12"]
  - expression: "`bad\\u123`"
    result: ["malformed-u123"]
  - expression: "`bad\\u12G4`"
    result: ["malformed-u12G4"]
  - expression: "`bad\\uZZZZ`"
    result: ["malformed-uZZZZ"]
  - expression: "2 'mo'"
    result: ["2 'mo'"]
  - expression: "2 years"
    result: ["2 years"]
  - expression: "(2 years).value" # test of internal structure, not FHIRPath
    result: [2]
  - expression: "@2019"
    result: ["2019"]
  - expression: "@2019-02-03T01:00Z = @2019-02-02T21:00-04:00"
    result: [true]
  - expression: "@2019-02-03T02:00Z = @2019-02-02T21:00-04:00"
    result: [false]
  - expression: '-7'
    result: [-7]
  - expression: '-7.3'
    result: [-7.3]
  - expression: '-7L'
    result: ['-7'] # long numbers are stored as strings in JSON format
  - expression: '+7'
    result: [+7]
  - expression: '(-7).combine(3)'
    result: [-7, 3]
  - expression: '-7.combine(3)' # same as next case
    error: true
  - expression: '-((7).combine(3))'
    error: true # per Bryn
  - expression: '-true'
    error: true
  - expression: "-'zzz'"
    error: true

subject:
  prop: val
  "id\u00E9": decoded-id
  'badu12': malformed-u12
  'badu123': malformed-u123
  'badu12G4': malformed-u12G4
  'baduZZZZ': malformed-uZZZZ
